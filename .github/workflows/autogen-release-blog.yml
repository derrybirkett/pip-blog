name: Autogen Release Blog Post

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Generate post from changelog
        id: gen
        run: |
          set -euo pipefail
          # SHAs must reference the .pip submodule repo, not the outer repo.
          # Use the submodule's own HEAD and its parent as the diff range.
          after="$(git -C .pip rev-parse HEAD)"
          before="$(git -C .pip rev-parse HEAD~1 2>/dev/null || echo "$after")"

          python3 ./.pip/bin/generate-release-blog-post.py \
            --before "$before" \
            --after "$after"

      - name: Create PR
        if: steps.gen.outputs.created == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "docs(blog): autogen release post"
          base: "${{ github.event.repository.default_branch }}"
          branch: "autogen/blog-${{ steps.gen.outputs.release_date }}"
          delete-branch: true
          title: "docs(blog): release post for ${{ steps.gen.outputs.release_date }}"
          body: |
            Autogenerated blog post: `${{ steps.gen.outputs.post_path }}`

            - Source: `docs/changelog.md`
            - Escape hatch: apply label `hold` to prevent scheduled automerge.
          labels: |
            autogen-blog
            automerge
